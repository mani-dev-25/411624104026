<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="uinput">
    <button id="btn">submit</button>
    <h2>Addition</h2>
    <input type="number" id="inp1">
    <input type="number" id="inp2">
    <button id="add">add</button>
    <h5 id="ans"></h5>
    <script>
        document.getElementById("btn").onclick=()=>{
            console.log(document.getElementById("uinput").value);
            document.getElementById("uinput").value="";
        }
        document.getElementById("add").onclick=()=>{
            let a=parseInt(document.getElementById("inp1").value);
            //let a=document.getElementById("inp1").value;
            //document.write(Number(a));
            let b=parseInt(document.getElementById("inp2").value);
            document.getElementById("ans").innerText=a+b;

        }

    </script>
</body>
</html>
